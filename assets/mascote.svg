<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" aria-hidden="true">
    <!-- Sombra base -->
    <ellipse cx="100" cy="270" rx="60" ry="6" fill="rgba(0,0,0,0.15)"/>

    <!-- Corpo (jaleco branco) -->
    <path d="M55 160 Q55 145 70 142 L130 142 Q145 145 145 160 L155 265 L45 265 Z" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>

    <!-- Botões do jaleco -->
    <circle cx="100" cy="185" r="3" fill="#44110D"/>
    <circle cx="100" cy="210" r="3" fill="#44110D"/>
    <circle cx="100" cy="235" r="3" fill="#44110D"/>

    <!-- Lapela esquerda -->
    <path d="M70 142 L85 165 L75 200 L65 165 Z" fill="#f5f5f5" stroke="#d9d9d9" stroke-width="1"/>
    <!-- Lapela direita -->
    <path d="M130 142 L115 165 L125 200 L135 165 Z" fill="#f5f5f5" stroke="#d9d9d9" stroke-width="1"/>

    <!-- Bolso -->
    <rect x="115" y="200" width="22" height="18" fill="none" stroke="#d9d9d9" stroke-width="1.5" rx="2"/>
    <!-- Caneta no bolso -->
    <rect x="119" y="195" width="3" height="14" fill="#44110D" rx="1"/>

    <!-- Braços -->
    <path d="M55 162 Q40 175 38 220 L48 235 Q55 230 58 215 L65 175 Z" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
    <path d="M145 162 Q160 175 162 220 L152 235 Q145 230 142 215 L135 175 Z" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>

    <!-- Mãos -->
    <circle cx="44" cy="230" r="9" fill="#f4c8a8"/>
    <circle cx="156" cy="230" r="9" fill="#f4c8a8"/>

    <!-- Pescoço -->
    <rect x="90" y="130" width="20" height="18" fill="#f4c8a8"/>

    <!-- Cabeça/rosto -->
    <ellipse cx="100" cy="115" rx="35" ry="38" fill="#f4c8a8"/>

    <!-- Orelhas -->
    <ellipse cx="66" cy="118" rx="6" ry="9" fill="#f4c8a8"/>
    <ellipse cx="134" cy="118" rx="6" ry="9" fill="#f4c8a8"/>

    <!-- Capacete amarelo (estrutura principal) -->
    <path d="M58 95 Q58 65 100 60 Q142 65 142 95 L142 100 L58 100 Z" fill="#FCD230" stroke="#B09322" stroke-width="1.5"/>

    <!-- Aba do capacete -->
    <path d="M52 95 Q52 88 60 88 L140 88 Q148 88 148 95 L148 102 L52 102 Z" fill="#FCD230" stroke="#B09322" stroke-width="1.5"/>

    <!-- Crista central do capacete -->
    <path d="M97 60 L100 55 L103 60 L102 90 L98 90 Z" fill="#D9B529"/>

    <!-- Faixa do capacete -->
    <rect x="58" y="80" width="84" height="4" fill="#44110D"/>

    <!-- Sobrancelhas brancas -->
    <path d="M78 102 Q83 99 90 102" stroke="#f5f5f5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M110 102 Q117 99 122 102" stroke="#f5f5f5" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Olhos -->
    <circle cx="85" cy="112" r="3" fill="#44110D"/>
    <circle cx="115" cy="112" r="3" fill="#44110D"/>
    <circle cx="86" cy="111" r="1" fill="#ffffff"/>
    <circle cx="116" cy="111" r="1" fill="#ffffff"/>

    <!-- Nariz -->
    <path d="M98 118 Q97 125 100 128 Q103 125 102 118" fill="#e8b896" stroke="#d4a07e" stroke-width="0.8"/>

    <!-- Bigode branco -->
    <path d="M75 138 Q85 134 100 138 Q115 134 125 138 Q120 145 110 144 Q100 142 90 144 Q80 145 75 138 Z" fill="#ffffff" stroke="#d9d9d9" stroke-width="1"/>

    <!-- Boca (sorriso discreto) -->
    <path d="M93 146 Q100 150 107 146" stroke="#8b4513" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Bochechas (leve cor) -->
    <ellipse cx="75" cy="125" rx="5" ry="3" fill="#e8a587" opacity="0.5"/>
    <ellipse cx="125" cy="125" rx="5" ry="3" fill="#e8a587" opacity="0.5"/>
</svg>
